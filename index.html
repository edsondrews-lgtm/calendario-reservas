<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas de Laboratórios - Unoesc Maravilha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ MODAL AUTENTICAÇÃO ═══ -->
  <div id="overlay-auth" class="overlay active" onclick="handleClose(event, 'overlay-auth')">
    <div class="modal modal-auth">
      <div class="modal-head">
        <h2>Autenticação</h2>
      </div>
      <div class="modal-body">
        <p>Somente pessoas autorizadas podem criar, editar ou excluir reservas. Insira o PIN para continuar.</p>
        <div class="field">
          <label>PIN de acesso</label>
          <input type="password" id="auth-pin" placeholder="••••" maxlength="6" autocomplete="off"
                 onkeydown="if(event.key==='Enter') submitAuth()">
          <small style="display:block;margin-top:6px;color:#666;">Dica: Alarme</small>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="resetAuth()">Limpar</button>
        <button class="btn-primary" onclick="submitAuth()">Entrar</button>
      </div>
    </div>
  </div>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="site-logo">
      <div class="site-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H6v-1c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1z"/></svg>
      </div>
      <div>
        <h1 class="site-logo-text">Reservas de Laboratórios - Unoesc Maravilha</h1>
        <span class="site-logo-sub">Gestão de uso dos espaços</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="role-badge" class="role-badge" style="display:none"></span>
      <button id="btn-new-reserva" class="btn-primary" onclick="openNew()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nova Reserva
      </button>
    </div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main class="main">
    <div id="stats-bar" class="stats-bar"></div>

    <div class="cal-card">
      <div id="container-avisos"></div>

      <div class="cal-nav">
        <div class="cal-nav-left">
          <button class="btn-nav" onclick="changeMonth(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <h2 id="cal-title" class="cal-month-title">—</h2>
          <button class="btn-nav" onclick="changeMonth(1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="btn-today" onclick="goToday()">Hoje</button>
        </div>
        <div class="cal-legend">
          <div class="legend-pill"><div class="legend-swatch cyan"></div>Laboratório Ciano</div>
          <div class="legend-pill"><div class="legend-swatch blue"></div>Laboratório Azul</div>
          <div class="legend-pill"><div class="legend-swatch aviso"></div>Aviso</div>
        </div>
      </div>

      <div class="cal-weekdays">
        <div class="cal-weekday">Dom</div><div class="cal-weekday">Seg</div><div class="cal-weekday">Ter</div>
        <div class="cal-weekday">Qua</div><div class="cal-weekday">Qui</div><div class="cal-weekday">Sex</div>
        <div class="cal-weekday">Sáb</div>
      </div>

      <div id="cal-grid" class="cal-grid"></div>
    </div>
  </main>

  <!-- ═══ MODAL NOVA RESERVA / AVISO ═══ -->
  <div id="overlay-new" class="overlay" onclick="handleClose(event, 'overlay-new')">
    <div class="modal modal-new">
      <div class="modal-head">
        <h2>Nova Reserva</h2>
        <button class="btn-close" onclick="closeModal('overlay-new')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">

        <!-- Datas -->
        <div class="field-row">
          <div class="field">
            <label id="lbl-date-start">Data de Início</label>
            <input type="date" id="f-date">
          </div>
          <div class="field" id="field-date-end">
            <label>Repetir até (Opcional)</label>
            <input type="date" id="f-date-end">
          </div>
        </div>

        <!-- Tipo -->
        <div class="field">
          <label>Tipo de Registro</label>
          <select id="f-tipo" onchange="toggleFormFields()">
            <option value="reserva">Reserva de Laboratório</option>
            <option value="aviso">Aviso / Dinâmica</option>
          </select>
        </div>

        <!-- Laboratório (oculto para aviso) -->
        <div class="field" id="field-lab">
          <label>Laboratório</label>
          <select id="f-lab">
            <option value="cyan">Laboratório Ciano</option>
            <option value="blue">Laboratório Azul</option>
          </select>
        </div>

        <!-- Professor / Título do aviso -->
        <div class="field">
          <label id="lbl-prof">Professor(a)</label>
          <input type="text" id="f-prof" placeholder="Ex: Prof. Anderson">
        </div>

        <!-- Curso + Fase (oculto para aviso) -->
        <div class="field-row" id="field-curso">
          <div class="field">
            <label>Curso</label>
            <input type="text" id="f-curso" placeholder="Ex: Sistemas de Informação">
          </div>
          <div class="field">
            <label>Fase</label>
            <input type="text" id="f-fase" placeholder="Ex: 3ª">
          </div>
        </div>

        <!-- Horários (oculto para aviso) -->
        <div class="field-row" id="field-horario">
          <div class="field">
            <label>Horário Início</label>
            <input type="time" id="f-start">
          </div>
          <div class="field">
            <label>Horário Fim</label>
            <input type="time" id="f-end">
          </div>
        </div>

        <!-- Software (oculto para aviso) -->
        <div class="field" id="field-prog">
          <label>Programa / Software Necessário</label>
          <input type="text" id="f-prog" placeholder="Ex: VS Code, SQL Server">
        </div>

        <!-- Observações (oculto para aviso) -->
        <div class="field" id="field-obs">
          <label>Observações</label>
          <textarea id="f-obs" placeholder="Algum detalhe extra?"></textarea>
        </div>

      </div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="closeModal('overlay-new')">Cancelar</button>
        <button class="btn-primary" onclick="saveReservation()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ═══ MODAL DETALHE ═══ -->
  <div id="overlay-detail" class="overlay" onclick="handleClose(event, 'overlay-detail')">
    <div class="modal modal-detail" id="modal-detail-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
